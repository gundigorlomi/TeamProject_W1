<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Veracity · Influencer Authenticity Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    html, body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace !important; }
    body { background: #f8fafc; }
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(14px) scale(0.992); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes metric-rise {
      from { opacity: 0; transform: translateY(8px); filter: blur(3px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes fill-bar {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    @keyframes draw-line {
      from { stroke-dashoffset: 1; opacity: 0.35; }
      to { stroke-dashoffset: 0; opacity: 1; }
    }
    @keyframes area-fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes burst-pop {
      0% { transform: scale(0.45); opacity: 0; }
      70% { transform: scale(1.14); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes gauge-glow {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(99, 102, 241, 0)); }
      50% { filter: drop-shadow(0 6px 16px rgba(99, 102, 241, 0.16)); }
    }
    .dashboard-grid > div {
      animation: card-enter 520ms cubic-bezier(.22,.61,.36,1) both;
    }
    .dashboard-grid > div:nth-child(2) { animation-delay: 70ms; }
    .dashboard-grid > div:nth-child(3) { animation-delay: 130ms; }
    .dashboard-grid > div:nth-child(4) { animation-delay: 190ms; }
    .dashboard-grid > div:nth-child(5) { animation-delay: 250ms; }
    .dashboard-grid > div:nth-child(6) { animation-delay: 310ms; }
    .dashboard-grid > div:nth-child(7) { animation-delay: 370ms; }
    .dashboard-card {
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.035);
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }
    .dashboard-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.08);
      border-color: #cbd5e1;
    }
    .metric-cell { animation: metric-rise 460ms cubic-bezier(.22,.61,.36,1) both; }
    .metric-cell:nth-child(2) { animation-delay: 70ms; }
    .metric-cell:nth-child(3) { animation-delay: 140ms; }
    .metric-cell:nth-child(4) { animation-delay: 210ms; }
    .metric-value { transition: color 180ms ease, transform 180ms ease; }
    .metric-cell:hover .metric-value { transform: translateY(-1px); color: #4f46e5; }
    .bar-fill {
      transform-origin: left center;
      animation: fill-bar 720ms cubic-bezier(.22,.61,.36,1) both;
    }
    .gauge-value-arc {
      animation: draw-line 900ms cubic-bezier(.22,.61,.36,1) both, gauge-glow 1800ms ease-in-out 320ms 1;
      stroke-dasharray: 1;
      stroke-dashoffset: 0;
    }
    .chart-area { animation: area-fade 520ms ease both; }
    .chart-line {
      stroke-dasharray: 1;
      animation: draw-line 820ms cubic-bezier(.22,.61,.36,1) both;
    }
    .chart-line-muted {
      stroke-dasharray: 0.012 0.012;
      animation: area-fade 620ms ease 80ms both;
    }
    .burst-marker {
      transform-box: fill-box;
      transform-origin: center;
      animation: burst-pop 420ms cubic-bezier(.22,.61,.36,1) both;
    }
    .range-control {
      position: relative;
      isolation: isolate;
    }
    .range-thumb {
      position: absolute;
      top: 2px;
      bottom: 2px;
      width: calc((100% - 4px) / 3);
      border-radius: 5px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.12);
      transform: translateX(var(--range-x, 0%));
      transition: transform 260ms cubic-bezier(.22,.61,.36,1);
      z-index: -1;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
    /* subtle scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; border: 2px solid #f8fafc; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
